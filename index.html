<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Brights CHEER DANCE | 所沢キッズチアダンス</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --yellow: #facc15;
      --orange: #fb923c;
      --text: #1f2933;
      --muted: #6b7280;
      --bg-soft: #fffbea;
      --radius: 16px;
      --shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    body {
      margin: 0;
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      color: var(--text);
      background: #cce7ff;
    }

    img { max-width: 100%; display: block; }

    header {
      position: sticky;
      top: 0;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(0,0,0,0.1);
      padding: 10px 20px;
      z-index: 50;
    }

    .header-inner {
      max-width: 1100px;
      margin: auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    nav button {
      background: none;
      border: none;
      padding: 8px 14px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.9rem;
      color: var(--muted);
    }

    nav button:hover {
      background: rgba(0,0,0,0.05);
      color: var(--text);
    }

    .nav-cta {
      background: var(--orange);
      color: #fff;
    }

    section {
      padding: 70px 20px;
    }

    .inner {
      max-width: 1100px;
      margin: auto;
    }

    h2 {
      font-size: 1.8rem;
      margin-bottom: 10px;
    }

    .lead {
      color: var(--muted);
      margin-bottom: 30px;
      line-height: 1.7;
    }

    .hero {
      display: grid;
      grid-template-columns: 1fr;
      text-align: center;
      padding-top: 80px;
    }

    .hero-title {
      font-size: 2.4rem;
      line-height: 1.3;
      margin-bottom: 16px;
    }

    /* ★ Brights ✨ の文字を白＋濃い青に変更 */
    .hero-title .brights-mark {
      color: #ffffff;
      text-shadow: 0 0 4px #003366;
    }

    .btn {
      padding: 10px 20px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      margin-right: 10px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--yellow), var(--orange));
      color: #fff;
      box-shadow: var(--shadow);
    }

    .btn-ghost {
      background: #fff;
      border: 1px solid rgba(0,0,0,0.2);
      color: var(--orange);
    }

    .class-grid {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .class-card {
      background: #fff;
      padding: 30px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid rgba(0,0,0,0.1);
      position: relative;
      width: 80%;
      max-width: 700px;
    }

    .class-card img {
      border-radius: var(--radius);
      margin-bottom: 10px;
    }

    .class-card-accent {
      background: linear-gradient(135deg, #fff7e6, #fff3d1);
      border-color: var(--orange);
    }

    .access-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .access-box {
      border: 1px dashed var(--muted);
      padding: 20px;
      border-radius: var(--radius);
      text-align: center;
      color: var(--muted);
      background: #fff;
    }

    .map-wrap {
      width: 100%;
      overflow: hidden;
      border-radius: var(--radius);
    }

    .map-wrap iframe {
      width: 100%;
      height: 400px;
      border: 0;
      border-radius: var(--radius);
      display: block;
    }

    footer {
      text-align: center;
      padding: 30px 20px;
      color: var(--muted);
      border-top: 1px solid rgba(0,0,0,0.1);
    }

    @media (max-width: 600px) {
      section { padding: 50px 16px; }
      .hero { padding-top: 40px; }
      .hero img { width: 85%; max-width: 320px; margin-bottom: 20px; }
      .hero-title { font-size: 1.8rem; }
      .lead { font-size: 0.95rem; line-height: 1.6; }
      .access-grid { grid-template-columns: 1fr; gap: 30px; }
      .map-wrap iframe { height: 300px; }
      nav button { padding: 6px 10px; font-size: 0.8rem; }
      .class-card { width: 100%; max-width: none; }
    }
  </style>

  <script>
    function scrollToId(id) {
      const el = document.getElementById(id);
      const y = el.getBoundingClientRect().top + window.scrollY - 80;
      window.scrollTo({ top: y, behavior: "smooth" });
    }
  </script>
</head>

<body>

  <header>
    <div class="header-inner">
      <div class="logo-area">
        <div>
          <strong>Brights CHEER DANCE</strong><br>
          <small>所沢キッズチアダンス</small>
        </div>
      </div>

      <nav>
        <button onclick="scrollToId('top')">トップ</button>
        <button onclick="scrollToId('classes')">クラス紹介</button>
        <button onclick="scrollToId('access')">アクセス</button>
        <button class="nav-cta" onclick="scrollToId('contact')">お問い合わせ</button>
      </nav>
    </div>
  </header>

  <section id="top">
    <div class="inner hero">

      <div>
        <h1 class="hero-title">所沢キッズチアダンス <span class="brights-mark">Brights ✨</span></h1>
        <p class="lead">
          毎週土曜日 13:45〜14:45<br>
          小学1年生〜／初心者大歓迎！<br>
          明るく元気にチアダンスを楽しみながら、仲間と一緒に成長していきましょう♪
        </p>
        <button class="btn btn-primary" onclick="scrollToId('contact')">無料体験に申し込む</button>
        <button class="btn btn-ghost" onclick="scrollToId('classes')">クラスを見る</button>
      </div>
    </div>
  </section>

  <section id="classes">
    <div class="inner">
      <h2>クラス紹介</h2>
      <p class="lead">初心者から楽しく始められるチアダンスクラスです。</p>
      <div class="class-grid">
        <div class="class-card class-card-accent">
          <img src="brights写真.jpg" alt="Brightsクラス">
          <h3>Brightsクラス</h3>
          <p>対象：小学1年生〜</p>
